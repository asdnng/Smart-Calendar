spring.application.name=MG

# -------------------------------------------------------
# Spring AI - OpenAI
# Set OPENAI_API_KEY as a system/environment variable or
# define it in a local .env file (never commit real keys)
# -------------------------------------------------------
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.chat.options.model=gpt-4o-mini

# -------------------------------------------------------
# MySQL Data Source
# -------------------------------------------------------
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/db1?useSSL=false&useUnicode=true&serverTimezone=Europe/Amsterdam&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}

# -------------------------------------------------------
# JPA / Hibernate
# -------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.show-sql=true

# -------------------------------------------------------
# OAuth2 - Google
# -------------------------------------------------------
spring.security.oauth2.client.registration.google.client-name=google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/login/oauth2/code/google
spring.security.oauth2.client.registration.google.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.google.scope=profile,email